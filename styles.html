<!-- Tailwind CSS & Google Fonts & Lucide Icons -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Tailwind CSS Play CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icons CDN -->
<script src="https://unpkg.com/lucide@latest"></script>

<script>
  // Tailwindのテーマ・フォント設定のカスタマイズ
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
          heading: ['Outfit', 'sans-serif'],
        },
        boxShadow: {
          'premium': '0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.03)',
          'premium-dark': '0 4px 25px -2px rgba(0, 0, 0, 0.3), 0 2px 10px -1px rgba(0, 0, 0, 0.2)',
        }
      }
    }
  }
</script>

<style>
  /* 基本フォントの適用 */
  body {
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* 画面切り替えのフェードインアニメーション */
  .fade-in {
    animation: fadeIn 0.2s ease-out forwards;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* カスタムスクロールバー (shadcn/ui風) */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  /* ライトモードのスクロールバー */
  ::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 9999px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
  }

  /* ダークモードのスクロールバー */
  .dark ::-webkit-scrollbar-thumb {
    background: #3f3f46;
  }

  .dark ::-webkit-scrollbar-thumb:hover {
    background: #52525b;
  }

  /* 手動微調整画面での移動先リスト用のアニメーション */
  .transition-all-200 {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
</style>
