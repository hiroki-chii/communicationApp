<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>社内ランチ交流会 - マッチングポータル</title>
  <!-- インライン展開されるスタイルシート -->
  <!-- Tailwind CSS & Google Fonts & Lucide Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    // Tailwindのテーマ・フォント設定のカスタマイズ
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          boxShadow: {
            'premium': '0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.03)',
            'premium-dark': '0 4px 25px -2px rgba(0, 0, 0, 0.3), 0 2px 10px -1px rgba(0, 0, 0, 0.2)',
          }
        }
      }
    }
  </script>

  <style>
    /* 基本フォントの適用 */
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 画面切り替えのフェードインアニメーション */
    .fade-in {
      animation: fadeIn 0.2s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* カスタムスクロールバー (shadcn/ui風) */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    /* ライトモードのスクロールバー */
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 9999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* ダークモードのスクロールバー */
    .dark ::-webkit-scrollbar-thumb {
      background: #3f3f46;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }

    /* 手動微調整画面での移動先リスト用のアニメーション */
    .transition-all-200 {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>

<body
  class="bg-slate-50 text-slate-900 dark:bg-zinc-950 dark:text-zinc-50 min-h-screen flex flex-col md:flex-row transition-colors duration-200">

  <!-- PC用 左サイドバー (md以上で表示) -->

          <span>ダッシュボード</span>

        <a href="#matching" id="nav-matching"

  <!-- メインコンテンツ領域 -->
  <div class="flex-1 flex flex-col min-w-0 min-h-screen">

    <!-- PC用 ヘッダー (md以上で表示) -->
    <header
      class="hidden md:flex h-16 bg-white dark:bg-zinc-900 border-b border-slate-200 dark:border-zinc-800 px-8 items-center justify-between shrink-0 sticky top-0 z-20">
      <div id="page-title-container">
        <!-- ページタイトルがJSによって動的に書き換わる -->
        <h2 class="font-heading font-bold text-lg text-slate-900 dark:text-zinc-50" id="header-title">次回マッチング結果</h2>
      </div>

      <!-- 右上のユーティリティ (テーマ切り替え等) -->

        <!-- 管理者ログインバッジ (PC) -->

            title="ダークモード">
            <i data-lucide="moon" class="w-3.5 h-3.5"></i>
            <span>ダーク</span>
          </button>
          <button id="theme-btn-system"
            class="theme-btn px-2.5 py-1 rounded-md text-xs font-medium flex items-center gap-1.5 transition-all text-slate-500 hover:text-slate-800 dark:hover:text-zinc-200"

    <a href="#user-matching" id="nav-user-matching-mobile"

      <i data-lucide="calendar-heart" class="w-5 h-5"></i>
      <span>次回マッチング</span>
    </a>
    <a href="#user-profile" id="nav-user-profile-mobile"
      class="nav-item-mobile flex flex-col items-center justify-center gap-1 text-[10px] font-medium py-1.5 flex-1 select-none">

    </a>
  </nav>

  <!-- 管理者用ボトムナビ (管理者モード時のみ表示) -->

    <a href="#dashboard" id="nav-dashboard-mobile"
      class="nav-item-mobile flex flex-col items-center justify-center gap-1 text-[10px] font-medium py-1.5 flex-1 select-none">
      <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
      <span>ダッシュボード</span>
    </a>
    <a href="#matching" id="nav-matching-mobile"
      class="nav-item-mobile flex flex-col items-center justify-center gap-1 text-[10px] font-medium py-1.5 flex-1 select-none">
      <i data-lucide="sparkles" class="w-5 h-5"></i>
      <span>作成</span>
    </a>
    <a href="#members" id="nav-members-mobile"
      class="nav-item-mobile flex flex-col items-center justify-center gap-1 text-[10px] font-medium py-1.5 flex-1 select-none">
      <i data-lucide="users" class="w-5 h-5"></i>
      <span>メンバー</span>
    </a>
    <a href="#settings" id="nav-settings-mobile"
      class="nav-item-mobile flex flex-col items-center justify-center gap-1 text-[10px] font-medium py-1.5 flex-1 select-none">
      <i data-lucide="settings" class="w-5 h-5"></i>
      <span>設定</span>

  </nav>

  <!-- 通知トーストトレイ -->
  <div id="toast-container"
    class="fixed bottom-18 md:bottom-6 right-4 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none"></div>

  <!-- インライン展開されるJavaScriptロジック -->
  <script>
    // ==========================================
    // アプリケーションのグローバル状態 (State)
    // ==========================================
    const state = {
      currentView: 'user-matching', // デフォルトは一般マッチング画面
      theme: 'system', // 'light' | 'dark' | 'system'
      members: [],
      settings: {},
      history: [],
      totalCount: 0,
      activeCount: 0,
      hasApiKey: false,

      // ユーザー/管理者 分離用の追加状態
      isAdmin: false,
      currentUserEmail: '',
      myProfile: null,
      mobileNavMode: 'user', // 'user' | 'admin' (モバイルでのナビ切り替え用)

      // マッチング実行中の一時状態
      tempGroups: null,
      tempMethod: '',
      isMatchingRunning: false,

      // メンバー編集用一時状態
      editingMember: null,
    };

    // ==========================================
    // GAS サーバーサイド連携 of Promise ラッパー
    // ==========================================
    function callGas(functionName, ...args) {
      return new Promise((resolve, reject) => {
        if (typeof google === 'undefined' || !google.script || !google.script.run) {
          // ローカル開発用ダミーレスポンス
          console.warn(`Local development fallback for: ${functionName}`);
          setTimeout(() => resolve(getDummyResponse(functionName, args)), 600);
          return;
        }

        google.script.run
          .withSuccessHandler(res => resolve(res))
          .withFailureHandler(err => reject(err))[functionName](...args);
      });
    }

    // ==========================================
    // トースト通知 (shadcn/ui スタイル)
    // ==========================================
    function showToast(title, message, type = 'success') {
      const container = document.getElementById('toast-container');
      if (!container) return;

      const toast = document.createElement('div');
      toast.className = 'pointer-events-auto flex items-start gap-3 w-full p-4 rounded-xl border shadow-premium dark:shadow-premium-dark bg-white dark:bg-zinc-900 transition-all duration-300 transform translate-y-2 opacity-0 fade-in';

      let iconColor = 'text-indigo-600 dark:text-indigo-400';
      let iconName = 'info';
      let borderColor = 'border-slate-100 dark:border-zinc-800';

      if (type === 'success') {
        iconColor = 'text-emerald-500';
        iconName = 'check-circle-2';
        borderColor = 'border-emerald-100 dark:border-emerald-950/30';
      } else if (type === 'error') {
        iconColor = 'text-red-500';
        iconName = 'alert-triangle';
        borderColor = 'border-red-100 dark:border-red-950/30';
      } else if (type === 'warning') {
        iconColor = 'text-amber-500';
        iconName = 'alert-circle';
        borderColor = 'border-amber-100 dark:border-amber-950/30';
      }

      toast.classList.add(...borderColor.split(' '));

      toast.innerHTML = `
        <div class="${iconColor} mt-0.5">
          <i data-lucide="${iconName}" class="w-5 h-5"></i>
        </div>
        <div class="flex-1">
          <h4 class="text-xs font-semibold text-slate-900 dark:text-zinc-50">${title}</h4>
          <p class="text-xs text-slate-500 dark:text-zinc-400 mt-0.5 leading-relaxed">${message}</p>
        </div>
        <button class="text-slate-400 hover:text-slate-600 dark:hover:text-zinc-200 transition-colors" onclick="this.parentElement.remove()">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      `;

      container.appendChild(toast);
      lucide.createIcons();

      setTimeout(() => {
        toast.classList.remove('translate-y-2', 'opacity-0');
      }, 10);

      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-10px]');
        setTimeout(() => toast.remove(), 300);
      }, 5000);
    }

    // ==========================================
    // 初期ロードとデータ取得
    // ==========================================
    async function loadInitialData() {
      try {
        const res = await callGas('getInitialData');
        if (res.success) {
          state.members = res.members;
          state.settings = res.settings;
          state.history = res.history;
          state.totalCount = res.totalCount;
          state.activeCount = res.activeCount;
          state.hasApiKey = res.hasApiKey;
          state.isAdmin = res.isAdmin;

          state.currentUserEmail = res.currentUserEmail;
          state.myProfile = res.myProfile;

          // 保存されていたテーマの設定を適用
          const savedTheme = localStorage.getItem('lunch-app-theme');
          if (savedTheme) {
            state.theme = savedTheme;
          }
          applyTheme(state.theme);

          // ログインアカウントのメールとロール表示の更新
          updateUserUI();

          // 管理者権限がある場合、メニューを表示する
          if (state.isAdmin) {
            const pcAdminMenu = document.getElementById('pc-admin-menu-section');
            if (pcAdminMenu) pcAdminMenu.classList.remove('hidden');

            const pcAdminBadge = document.getElementById('pc-admin-badge');
            if (pcAdminBadge) pcAdminBadge.classList.remove('hidden');

            const mobileAdminToggle = document.getElementById('mobile-admin-mode-toggle');
            if (mobileAdminToggle) mobileAdminToggle.classList.remove('hidden');
          }

          showToast('データの同期完了', 'スプレッドシートから最新のデータを取得しました。', 'success');

          // ルーティング開始（ハッシュが空か無効なら一般マッチングへ）
          const currentHash = window.location.hash;
          if (!currentHash || !['#user-matching', '#user-profile', '#dashboard', '#matching', '#members', '#settings'].includes(currentHash)) {
            window.location.hash = '#user-matching';
          } else {
            handleRoute();
          }
        } else {
          showToast('同期エラー', res.error || 'データの読み込みに失敗しました。', 'error');
        }
      } catch (e) {
        showToast('エラー', 'サーバーとの接続中に例外が発生しました：' + e.toString(), 'error');
      }
    }

    // アカウントUI表示の更新
    function updateUserUI() {
      const pcEmail = document.getElementById('pc-user-email');
      const mobEmail = document.getElementById('mobile-user-email');
      const pcRole = document.getElementById('pc-user-role-badge');

      if (pcEmail) pcEmail.textContent = state.currentUserEmail || 'ゲストユーザー';
      if (mobEmail) mobEmail.textContent = state.currentUserEmail || 'ゲスト';

      if (pcRole && state.isAdmin) {
        pcRole.textContent = 'SYSTEM ADMIN';
        pcRole.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded bg-indigo-50 text-indigo-600 dark:bg-indigo-950/40 dark:text-indigo-400 border border-indigo-100/30 dark:border-indigo-900/30 tracking-wider uppercase mt-1 w-max';
      }
    }

    // ==========================================
    // テーマ管理 (ライト/ダーク/システム)
    // ==========================================
    function applyTheme(themeMode) {
      state.theme = themeMode;
      localStorage.setItem('lunch-app-theme', themeMode);

      const root = document.documentElement;
      const isDark = themeMode === 'dark' || (themeMode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

      if (isDark) {
        root.classList.add('dark');
      } else {
        root.classList.remove('dark');
      }

      updateThemeSelectorUI();
    }

    function updateThemeSelectorUI() {
      ['light', 'dark', 'system'].forEach(m => {
        const btn = document.getElementById(`theme-btn-${m}`);
        if (!btn) return;
        if (state.theme === m) {
          btn.className = 'theme-btn px-2.5 py-1 rounded-md text-xs font-semibold flex items-center gap-1.5 transition-all bg-white dark:bg-zinc-700 shadow-sm text-slate-800 dark:text-zinc-100';
        } else {
          btn.className = 'theme-btn px-2.5 py-1 rounded-md text-xs font-medium flex items-center gap-1.5 transition-all text-slate-500 hover:text-slate-800 dark:hover:text-zinc-200';
        }
      });

      const mobileBtnIcon = document.getElementById('theme-icon-mobile');
      if (mobileBtnIcon) {
        const root = document.documentElement;
        const isCurrentlyDark = root.classList.contains('dark');
        mobileBtnIcon.setAttribute('data-lucide', isCurrentlyDark ? 'sun' : 'moon');
        lucide.createIcons();
      }
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (state.theme === 'system') {
        applyTheme('system');
      }
    });

    // ==========================================
    // ルーティング制御とセキュリティガード
    // ==========================================
    function handleRoute() {
      const hash = window.location.hash || '#user-matching';

      // クエリパラメータのパース
      let viewName = hash.replace('#', '');
      let queryParams = {};
      if (viewName.includes('?')) {
        const parts = viewName.split('?');
        viewName = parts[0];
        const queryStr = parts[1];
        queryStr.split('&').forEach(p => {
          const [k, v] = p.split('=');
          if (k && v) {
            queryParams[k] = decodeURIComponent(v);
          }
        });
      }

      // セキュリティ保護: 管理者専用ハッシュで、かつ非管理者の場合
      const adminViews = ['dashboard', 'matching', 'members', 'settings'];
      if (adminViews.includes(viewName) && !state.isAdmin) {
        showToast('アクセス拒否', 'この画面を開くには管理者権限が必要です。', 'error');
        window.location.hash = '#user-matching';
        return;
      }

      // 画面遷移時にチャットポーリングを確実にクリーンアップ
      if (state.chatInterval) {
        clearInterval(state.chatInterval);
        state.chatInterval = null;
        console.log('[DEBUG] チャット自動ポーリングをクリーンアップしました。');
      }

      state.currentView = viewName;
      state.currentQueryParams = queryParams; // パラメータを保持

      // ナビゲーションメニューのアクティブ化（PC側）
      const allViews = ['user-matching', 'user-profile', 'dashboard', 'matching', 'members', 'settings'];
      allViews.forEach(id => {
        const pcNav = document.getElementById(`nav-${id}`);
        if (pcNav) {
          if (id === viewName) {
            pcNav.className = 'nav-item flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400 group';
          } else {
            pcNav.className = 'nav-item flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all text-slate-600 hover:bg-slate-50 dark:text-zinc-400 dark:hover:bg-zinc-800/50 group';
          }
        }
      });

      // モバイル用ボトムナビのアクティブ＆トグル制御
      updateMobileNavigationUI(viewName);

      // タイトルの変更
      const headerTitle = document.getElementById('header-title');
      if (headerTitle) {
        const titles = {
          'user-matching': '次回ランチグループ結果',
          'user-profile': '自分のプロフィール登録',
          'chat': 'グループチャット',
          dashboard: '管理者ダッシュボード',
          matching: 'インテリジェントマッチング生成',
          members: 'メンバーマスタ管理',
          settings: 'システム全体設定'
        };
        headerTitle.textContent = titles[viewName] || 'マッチングポータル';
      }

      renderView();
    }

    // モバイルナビゲーション表示切り替え
    function updateMobileNavigationUI(viewName) {
      const userNav = document.getElementById('mobile-nav-user');
      const adminNav = document.getElementById('mobile-nav-admin');
      const toggleBtn = document.getElementById('mobile-admin-mode-toggle');
      const toggleText = document.getElementById('mobile-admin-toggle-text');

      if (!userNav || !adminNav) return;

      const adminViews = ['dashboard', 'matching', 'members', 'settings'];

      if (adminViews.includes(viewName)) {
        // 管理者ビューのナビゲーションを表示
        userNav.classList.add('hidden');
        adminNav.classList.remove('hidden');
        state.mobileNavMode = 'admin';

        if (toggleText) toggleText.textContent = '一般用へ';
      } else {
        // 一般ユーザービューのナビゲーションを表示
        userNav.classList.remove('hidden');
        adminNav.classList.add('hidden');
        state.mobileNavMode = 'user';

        if (toggleText) toggleText.textContent = '管理者用へ';
      }

      // アクティブクラスの付与（モバイル）
      const mobViewIds = ['user-matching', 'user-profile', 'dashboard', 'matching', 'members', 'settings'];
      mobViewIds.forEach(id => {
        const mobNav = document.getElementById(`nav-${id}-mobile`);
        if (mobNav) {
          if (id === viewName) {
            mobNav.className = 'nav-item-mobile flex flex-col items-center justify-center gap-1 text-[10px] font-semibold py-1.5 flex-1 select-none text-indigo-600 dark:text-indigo-400';
          } else {
            mobNav.className = 'nav-item-mobile flex flex-col items-center justify-center gap-1 text-[10px] font-medium py-1.5 flex-1 select-none text-slate-400 dark:text-zinc-500';
          }
        }
      });
    }

    // ==========================================
    // ビューレンダリング
    // ==========================================
    function renderView() {
      const container = document.getElementById('app-view');
      if (!container) return;

      container.classList.remove('fade-in');

      let html = '';

      switch (state.currentView) {
        // --- 一般ユーザービュー ---
        case 'user-matching':
          html = getUserMatchingViewHtml();
          break;
        case 'user-profile':
          html = getUserProfileViewHtml();
          break;
        case 'chat':
          html = getChatViewHtml(state.currentQueryParams.roomId);
          break;

        // --- 管理者ビュー ---
        case 'dashboard':
          html = getDashboardViewHtml();
          break;
        case 'matching':
          html = getMatchingViewHtml();
          break;
        case 'members':
          html = getMembersViewHtml();
          break;
        case 'settings':
          html = getSettingsViewHtml();
          break;
        default:
          html = `<div class="p-8 text-center text-red-500">お探しの画面が見つかりません。</div>`;
      }

      container.innerHTML = html;
      container.classList.add('fade-in');

      lucide.createIcons();
      attachViewEvents();
    }

    // 自己プロファイルの保存
    async function handleSaveSelfProfile() {
      const name = document.getElementById('self-name').value.trim();
      const department = document.getElementById('self-dept').value.trim();
      const interests = document.getElementById('self-interests').value.trim();
      const considerations = document.getElementById('self-considerations').value.trim();
      const status = document.getElementById('self-status').value === 'true';

      // チェックボックスの集計
      const checkedPurposes = [];
      document.querySelectorAll('input[name="self_purpose"]:checked').forEach(cb => {
        checkedPurposes.push(cb.value);
      });

      if (!name || !department) {
        showToast('入力エラー', '名前と部署は入力必須です。', 'error');
        return;
      }

      const profileObj = {
        name,
        department,
        interests,
        purpose: checkedPurposes.join(', '),
        status,
        considerations
      };

      showToast('保存中', 'プロフィール情報を登録しています...', 'warning');

      try {
        const res = await callGas('registerSelfProfile', profileObj);
        if (res.success) {
          state.myProfile = res.myProfile;

          // 登録完了後、全メンバーリストも再ロードして同期する
          const loadRes = await callGas('getInitialData');
          if (loadRes.success) {
            state.members = loadRes.members;
            state.totalCount = loadRes.totalCount;
            state.activeCount = loadRes.activeCount;
          }

          showToast('保存成功', 'プロフィールの保存が完了しました！次回マッチングをお楽しみに。', 'success');

          // 保存後は次回マッチング結果画面へ遷移
          window.location.hash = '#user-matching';
        } else {
          showToast('保存エラー', res.error || 'プロフィールの登録に失敗しました。', 'error');
        }
      } catch (e) {
        showToast('エラー', '保存中に例外が発生しました：' + e.toString(), 'error');
      }
    }

    // チャットメッセージ履歴の読込と描画 (5秒毎ポーリング)
    async function loadChatMessages(roomId, isPolling = false) {
      const container = document.getElementById('chat-messages-container');
      if (!container) return;

      try {
        const res = await callGas('getChatMessages', roomId);
        if (res.success) {
          const messages = res.messages || [];

          if (messages.length === 0) {
            container.innerHTML = `
              <div class="flex-1 flex flex-col items-center justify-center gap-2 py-12 text-center text-slate-400 dark:text-zinc-500">
                <i data-lucide="message-square-dashed" class="w-8 h-8 opacity-60"></i>
                <p class="text-xs font-semibold">チャットメッセージはまだありません</p>
                <p class="text-[10px] opacity-80">グループメンバーへの挨拶や、ランチ会の日程調整などを気軽に書き込んでみましょう！</p>
              </div>
            `;
            lucide.createIcons();
            return;
          }

          // スクリュー位置の判定：ユーザーが手動で過去ログを上に遡って読んでいるか
          const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 150;

          let messagesHtml = '';
          messagesHtml += `<div class="space-y-4 flex-1">`;

          // ルームIDから開催日とグループIDをパースして該当のグループ情報を取得
          const parts = roomId.split('_');
          const dateStr = parts[0] || '';
          const groupId = parts[1] || '';
          const matchingGroup = state.history.find(h => h.date === dateStr && h.groupId === groupId);

          // 管理者リストを取得
          const adminEmailsStr = (state.settings && state.settings.admin_emails) || '';
          const adminEmails = adminEmailsStr.split(',').map(e => e.trim().toLowerCase());

          messagesHtml += messages.map(msg => {
            // 自分が送信したメッセージか判定 (大文字小文字を区別せず照合)
            const isMe = msg.senderEmail.toLowerCase() === state.currentUserEmail.toLowerCase();

            // 送信者が管理者であるか
            const isSenderAdmin = adminEmails.includes(msg.senderEmail.toLowerCase());

            // 送信者がこのグループの本来のメンバーであるか判定
            let isGroupMember = false;
            if (matchingGroup) {
              const cleanEmail = msg.senderEmail.toLowerCase();
              const senderMember = state.members.find(m => m.email.toLowerCase() === cleanEmail);
              if (senderMember) {
                isGroupMember = matchingGroup.memberIds.includes(senderMember.id);
              } else {
                const cleanName = (n) => n ? n.replace(/\s+/g, '') : '';
                isGroupMember = matchingGroup.memberNames.some(name => cleanName(name) === cleanName(msg.senderName));
              }
            }

            // 「グループメンバー以外の管理者」であるかの判定
            const isGroupOuterAdmin = isSenderAdmin && !isGroupMember;

            // 日本時間で見やすいフォーマットに変換 (例: 15:30)
            let timeStr = '';
            if (msg.timestamp) {
              const d = new Date(msg.timestamp);
              timeStr = ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
            }

            // 改行の対応
            const formattedMessage = escapeHtml(msg.message).replace(/\n/g, '<br>');

            // 管理者（グループ外）バッジのHTML
            const adminBadgeHtml = isGroupOuterAdmin ? `
              <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-amber-50 dark:bg-amber-950/40 text-amber-700 dark:text-amber-400 border border-amber-200/50 dark:border-amber-900/30 text-[8px] scale-90 origin-left font-bold shadow-sm shrink-0">
                <i data-lucide="shield-alert" class="w-2.5 h-2.5 text-amber-500 dark:text-amber-400"></i>
                <span>管理者 (グループ外)</span>
              </span>
            ` : '';

            if (isMe) {
              // 右側：自分自身のメッセージ (インディゴ/ダーク、あるいはグループ外管理者の場合はゴールド調)
              const cardBgClass = isGroupOuterAdmin
                ? 'bg-amber-600 dark:bg-amber-500 text-white border border-amber-500/30'
                : 'bg-indigo-600 dark:bg-indigo-500 text-white';
              
              return `
                <div class="flex flex-col items-end gap-1.5 max-w-[85%] ml-auto">
                  <div class="flex items-center gap-1.5 text-[9px] text-slate-400 dark:text-zinc-500">
                    ${adminBadgeHtml}
                    <span>${timeStr}</span>
                  </div>
                  <div class="p-3 rounded-2xl rounded-tr-none ${cardBgClass} text-xs leading-relaxed shadow-sm font-medium">
                    ${formattedMessage}
                  </div>
                </div>
              `;
            } else {
              // 左側：他のグループメンバーのメッセージ (白/ライトグレー、あるいはグループ外管理者の場合はゴールド調枠付き)
              const cleanName = (n) => n ? n.replace(/\s+/g, '') : '';
              const memberInfo = state.members.find(m => m.email.toLowerCase() === msg.senderEmail.toLowerCase() || cleanName(m.name) === cleanName(msg.senderName)) || {};
              
              const cardBgClass = isGroupOuterAdmin
                ? 'bg-amber-50/40 dark:bg-amber-950/20 border border-amber-200/60 dark:border-amber-900/30 text-amber-900 dark:text-amber-200 shadow-amber-100/10'
                : 'bg-white dark:bg-zinc-900 border border-slate-100 dark:border-zinc-800 text-slate-800 dark:text-zinc-200';

              return `
                <div class="flex flex-col items-start gap-1.5 max-w-[85%] mr-auto">
                  <div class="flex items-center gap-1.5 text-[9px] text-slate-400 dark:text-zinc-500 relative group cursor-help flex-wrap">
                    <span class="font-bold text-slate-700 dark:text-zinc-300">${escapeHtml(msg.senderName)}</span>
                    <span class="px-1.5 py-0.2 rounded bg-slate-200/50 dark:bg-zinc-800 text-[8px] scale-90 origin-left font-semibold text-slate-500 dark:text-zinc-400">${escapeHtml(msg.department)}</span>
                    ${adminBadgeHtml}
                    <span>•</span>
                    <span>${timeStr}</span>
                    
                    <!-- 👤 ユーザー詳細ポップオーバー (配慮事項以外) -->
                    <div class="absolute bottom-full left-0 mb-2 w-64 max-h-60 overflow-y-auto p-4 rounded-xl border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-950 text-slate-800 dark:text-zinc-100 shadow-xl opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto transition-all duration-200 z-30 flex flex-col gap-2 text-xs text-left normal-case leading-normal font-sans">
                      <div class="flex flex-col border-b border-slate-100 dark:border-zinc-800 pb-1.5 shrink-0">
                        <span class="font-bold text-sm text-slate-900 dark:text-zinc-50">${escapeHtml(msg.senderName)}</span>
                        <span class="text-[10px] text-slate-400 dark:text-zinc-500 mt-0.5">${escapeHtml(msg.department || '他部署')}</span>
                      </div>
                      <div class="space-y-1">
                        <span class="text-[9px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-wider">趣味・自己紹介</span>
                        <p class="text-slate-600 dark:text-zinc-300 font-medium whitespace-normal leading-relaxed break-words">${escapeHtml(memberInfo.interests || '未登録')}</p>
                      </div>
                      <div class="space-y-1">
                        <span class="text-[9px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-wider">参加目的</span>
                        <p class="text-slate-600 dark:text-zinc-300 font-medium whitespace-normal leading-relaxed break-words">${escapeHtml(memberInfo.purpose || '未登録')}</p>
                      </div>
                      <div class="absolute top-full left-6 border-[6px] border-transparent border-t-white dark:border-t-zinc-950"></div>
                    </div>
                  </div>
                  <div class="p-3 rounded-2xl rounded-tl-none ${cardBgClass} text-xs leading-relaxed shadow-sm">
                    ${formattedMessage}
                  </div>
                </div>
              `;
            }
          }).join('');

          messagesHtml += `</div>`;
          container.innerHTML = messagesHtml;
          lucide.createIcons(); // 動的に挿入したshield-alertアイコンを描画するために呼び出し


          // 初回読込時、またはユーザーが最下部にいる場合は自動で一番下へスクロール
          if (!isPolling || isAtBottom) {
            container.scrollTop = container.scrollHeight;
          }
        } else {
          // エラー表示 (セキュリティ制限によるアクセス拒否も含む)
          if (!isPolling) {
            container.innerHTML = `
              <div class="flex-1 flex flex-col items-center justify-center gap-3 py-12 text-center text-red-500">
                <i data-lucide="shield-alert" class="w-10 h-10"></i>
                <div class="space-y-1">
                  <p class="text-xs font-bold">${escapeHtml(res.error || 'メッセージ履歴の取得に失敗しました。')}</p>
                  <p class="text-[10px] text-slate-400 dark:text-zinc-500">このチャットルームはあなたの所属グループではないか、閲覧権限がありません。</p>
                </div>
                <a href="#user-matching" class="mt-2 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 dark:bg-zinc-800 dark:hover:bg-zinc-700 text-slate-700 dark:text-zinc-300 font-semibold text-[10px] rounded-lg transition-colors">マッチング結果に戻る</a>
              </div>
            `;
            lucide.createIcons();
          }
        }
      } catch (e) {
        console.error('loadChatMessages 例外:', e);
        if (!isPolling) {
          container.innerHTML = `<div class="p-8 text-center text-xs text-red-500">サーバー通信中に例外が発生しました：${escapeHtml(e.toString())}</div>`;
        }
      }
    }

    // チャットメッセージの非同期送信処理
    async function handleSendChatMessage(roomId) {
      const input = document.getElementById('chat-message-input');
      const sendBtn = document.getElementById('btn-send-message');
      if (!input || !sendBtn) return;

      const messageText = input.value.trim();
      if (!messageText) return;

      // UI制御：送信中状態
      input.disabled = true;
      sendBtn.disabled = true;
      const originalBtnText = sendBtn.innerHTML;
      sendBtn.innerHTML = `<div class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>`;

      try {
        const res = await callGas('sendChatMessage', roomId, messageText);
        if (res.success) {
          input.value = '';
          // 送信直後に即座にメッセージ一覧を再描画して、一番下へスクロールさせる

        showToast('エラー', 'メッセージ送信中に例外が発生しました：' + e.toString(), 'error');

    // --- 各画面のイベントアタッチメント ---
    function attachViewEvents() {
      console.log('[DEBUG] attachViewEvents() を呼び出しました。現在のビュー:', state.currentView);

      // --- ① 共通UIビュー（モバイル用管理者切り替えトグルなど）のバインディング ---
      const mobileAdminToggle = document.getElementById('mobile-admin-mode-toggle');
      if (mobileAdminToggle) {
        // 多重イベント登録を防ぐため、一旦クローンしてリスナーをクリア
        const newToggle = mobileAdminToggle.cloneNode(true);
        mobileAdminToggle.parentNode.replaceChild(newToggle, mobileAdminToggle);

        newToggle.addEventListener('click', () => {
          if (state.mobileNavMode === 'user') {
            window.location.hash = '#dashboard';
          } else {
            window.location.hash = '#user-matching';
          }
        });
      }

      const mobileThemeToggle = document.getElementById('theme-toggle-mobile');
      if (mobileThemeToggle) {
        const newThemeToggle = mobileThemeToggle.cloneNode(true);
        mobileThemeToggle.parentNode.replaceChild(newThemeToggle, mobileThemeToggle);

        newThemeToggle.addEventListener('click', () => {
          const root = document.documentElement;
          const isDark = root.classList.contains('dark');
          applyTheme(isDark ? 'light' : 'dark');
        });
      }

      // PC用テーマ変更ボタンのイベント紐付け
      ['light', 'dark', 'system'].forEach(mode => {
        const btn = document.getElementById(`theme-btn-${mode}`);

    // 目標人数の変更に応じて、あまり（あふれ）が出ない上限に組数の選択肢を動的に更新する
    function updateGroupCountOptions() {
      const groupSizeSelect = document.getElementById('group-size');
      const groupCountSelect = document.getElementById('group-count');
      if (!groupSizeSelect || !groupCountSelect) return;

      const groupSize = parseInt(groupSizeSelect.value, 10);
      const activeCount = state.activeCount || 0;
      const currentSelectedCount = parseInt(groupCountSelect.value, 10);

      // 上限を「あまり（あふれ）が出ない数」、すなわち Math.ceil(activeCount / groupSize) に設定
      // ただし、最低でも1組は選択できるようにする
      const maxGroupCount = Math.max(1, Math.ceil(activeCount / groupSize));

      let groupCountOptions = '';
      for (let i = 1; i <= maxGroupCount; i++) {
        // 以前選択されていた値、または上限を超えた場合は新たな上限を選択状態にする
        const selected = (i === currentSelectedCount || (i === maxGroupCount && currentSelectedCount > maxGroupCount)) ? 'selected' : '';
        groupCountOptions += `<option value="${i}" ${selected}>${i} 組</option>`;
      }

      groupCountSelect.innerHTML = groupCountOptions;
    }



    // --- ② マッチング作成コントローラー ---
    async function handleGenerateMatching() {
      const form = document.getElementById('matching-form');
      if (!form) return;

      const formData = new FormData(form);
      const params = {
        mode: formData.get('matching_mode'),
        groupSize: formData.get('default_group_size'),
        groupCount: formData.get('default_group_count'), // 組数指定パラメータ
        additionalPrompt: formData.get('additional_prompt') || ''
      };

      state.isMatchingRunning = true;
      renderView();

      try {
        const res = await callGas('runMatching', params);
        state.isMatchingRunning = false;

        if (res.success) {
          state.tempGroups = res.groups;
          state.tempUnmatched = res.unmatched || []; // 今回枠からあふれたメンバー
          state.tempMethod = res.method === 'logic_fallback' ? 'Logic (Fallback)' : (res.method === 'logic' ? 'Logic' : 'Gemini');
          showToast('マッチング案作成完了', 'グループ分け案が正常に作成されました。内容を確認・調整してください。', 'success');
        } else {
          showToast('作成エラー', res.error || 'マッチングの生成に失敗しました。', 'error');
        }
      } catch (e) {
        state.isMatchingRunning = false;
        showToast('エラー', '通信中に例外が発生しました：' + e.toString(), 'error');
      }

      renderView();
    }

    function discardTempMatching() {
      if (confirm('作成中の一時マッチング案を破棄してよろしいですか？')) {
        state.tempGroups = null;
        renderView();
      }
    }

    function moveMember(fromGroupIdx, fromMemberIdx, toGroupIdx) {
      if (toGroupIdx < 0 || toGroupIdx >= state.tempGroups.length) return;

      const member = state.tempGroups[fromGroupIdx].members[fromMemberIdx];

      state.tempGroups[fromGroupIdx].members.splice(fromMemberIdx, 1);
      state.tempGroups[toGroupIdx].members.push(member);

      if (state.tempGroups[toGroupIdx].memo.indexOf('【手動微調整あり】') === -1) {
        state.tempGroups[toGroupIdx].memo = '【手動微調整あり】' + state.tempGroups[toGroupIdx].memo;
      }
      if (state.tempGroups[fromGroupIdx].memo.indexOf('【手動微調整あり】') === -1) {
        state.tempGroups[fromGroupIdx].memo = '【手動微調整あり】' + state.tempGroups[fromGroupIdx].memo;
      }

      renderView();
    }

    function updateGroupMemo(groupIdx, value) {
      if (state.tempGroups && state.tempGroups[groupIdx]) {
        state.tempGroups[groupIdx].memo = value;
      }
    }

    async function confirmTempMatching() {
      if (!state.tempGroups) return;

      const validGroups = state.tempGroups.filter(g => g.members.length > 0);

      if (validGroups.length === 0) {
        showToast('エラー', '有効なグループが存在しません。', 'error');
        return;
      }

      showToast('保存中', 'マッチング履歴を保存しています...', 'warning');

      try {

        if (res.success) {

    function getUniqueDepartments() {

    function filterMembersTable() {
      const searchVal = document.getElementById('member-search').value.toLowerCase().trim();
      const deptVal = document.getElementById('member-dept-filter').value;
      const tbody = document.getElementById('member-table-body');
      if (!tbody) return;

      const rows = tbody.getElementsByTagName('tr');

      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        if (row.cells.length < 7) continue;

        const name = row.cells[0].textContent.toLowerCase();
        const email = row.cells[1].textContent.toLowerCase();
        const dept = row.cells[2].textContent;
        const interests = row.cells[3].textContent.toLowerCase();
        const considerations = row.cells[4].textContent.toLowerCase();

        const matchesSearch = !searchVal || name.includes(searchVal) || email.includes(searchVal) || dept.toLowerCase().includes(searchVal) || interests.includes(searchVal) || considerations.includes(searchVal);
        const matchesDept = !deptVal || dept.includes(deptVal);

        if (matchesSearch && matchesDept) {
          row.style.display = '';
        } else {
          row.style.display = 'none';
        }
      }
    }

      const email = document.getElementById('m-email').value.trim();
      const dept = document.getElementById('m-dept').value.trim();
      const interests = document.getElementById('m-interests').value.trim();

          res = await callGas('addMember', memberObj);

        if (res.success) {

    // ユーティリティ関数
    // ==========================================
    function escapeHtml(str) {
      if (!str) return '';
      return str
        .toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
