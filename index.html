        // ユーザー/管理者 分離用の追加状態
        isAdmin: false,
        currentUserEmail: "",
        myProfile: null,
        mobileNavMode: "user", // 'user' | 'admin' (モバイルでのナビ切り替え用)

        // マッチング実行中の一時状態
        tempGroups: null,
        tempMethod: "",
        isMatchingRunning: false,

        // メンバー編集用一時状態
        editingMember: null,
      };

      // ==========================================
      // GAS サーバーサイド連携 of Promise ラッパー
      // ==========================================
      function callGas(functionName, ...args) {
        return new Promise((resolve, reject) => {
          if (
            typeof google === "undefined" ||
            !google.script ||
            !google.script.run
          ) {
            // ローカル開発用ダミーレスポンス
            console.warn(`Local development fallback for: ${functionName}`);
            setTimeout(
              () => resolve(getDummyResponse(functionName, args)),
              600,
            );
            return;
          }

          google.script.run
            .withSuccessHandler((res) => resolve(res))
            .withFailureHandler((err) => reject(err))
            [functionName](...args);
        });
      }

      // ==========================================
      // トースト通知 (shadcn/ui スタイル)
      // ==========================================
      function showToast(title, message, type = "success") {
        const container = document.getElementById("toast-container");
        if (!container) return;

        const toast = document.createElement("div");
        toast.className =
          "pointer-events-auto flex items-start gap-3 w-full p-4 rounded-xl border shadow-premium dark:shadow-premium-dark bg-white dark:bg-zinc-900 transition-all duration-300 transform translate-y-2 opacity-0 fade-in";

        let iconColor = "text-indigo-600 dark:text-indigo-400";
        let iconName = "info";
        let borderColor = "border-slate-100 dark:border-zinc-800";

        if (type === "success") {
          iconColor = "text-emerald-500";
          iconName = "check-circle-2";
          borderColor = "border-emerald-100 dark:border-emerald-950/30";
        } else if (type === "error") {
          iconColor = "text-red-500";
          iconName = "alert-triangle";
          borderColor = "border-red-100 dark:border-red-950/30";
        } else if (type === "warning") {
          iconColor = "text-amber-500";
          iconName = "alert-circle";
          borderColor = "border-amber-100 dark:border-amber-950/30";
        }

        toast.classList.add(...borderColor.split(" "));

        toast.innerHTML = `
        <div class="${iconColor} mt-0.5">
          <i data-lucide="${iconName}" class="w-5 h-5"></i>
        </div>
        <div class="flex-1">
          <h4 class="text-xs font-semibold text-slate-900 dark:text-zinc-50">${title}</h4>
          <p class="text-xs text-slate-500 dark:text-zinc-400 mt-0.5 leading-relaxed">${message}</p>
        </div>
        <button class="text-slate-400 hover:text-slate-600 dark:hover:text-zinc-200 transition-colors" onclick="this.parentElement.remove()">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      `;

        container.appendChild(toast);
        lucide.createIcons();

        setTimeout(() => {
          toast.classList.remove("translate-y-2", "opacity-0");
        }, 10);

        setTimeout(() => {
          toast.classList.add("opacity-0", "translate-y-[-10px]");
          setTimeout(() => toast.remove(), 300);
        }, 5000);
      }

      // ==========================================
      // 初期ロードとデータ取得
      // ==========================================
      async function loadInitialData() {
        try {
          const res = await callGas("getInitialData");
          if (res.success) {
            state.members = res.members;
            state.settings = res.settings;
            state.history = res.history;
            state.departments = res.departments || [];
            state.totalCount = res.totalCount;
            state.activeCount = res.activeCount;
            state.hasApiKey = res.hasApiKey;
            state.isAdmin = res.isAdmin;

            state.currentUserEmail = res.currentUserEmail;
            state.myProfile = res.myProfile;

            // 保存されていたテーマの設定を適用
            const savedTheme = localStorage.getItem("lunch-app-theme");
            if (savedTheme) {
              state.theme = savedTheme;
            }
            applyTheme(state.theme);

            // ログインアカウントのメールとロール表示の更新
            updateUserUI();

            // 管理者権限がある場合、メニューを表示する
            if (state.isAdmin) {
              const pcAdminMenu = document.getElementById(
                "pc-admin-menu-section",
              );
              if (pcAdminMenu) pcAdminMenu.classList.remove("hidden");

              const pcAdminBadge = document.getElementById("pc-admin-badge");
              if (pcAdminBadge) pcAdminBadge.classList.remove("hidden");

              const mobileAdminToggle = document.getElementById(
                "mobile-admin-mode-toggle",
              );
              if (mobileAdminToggle)
                mobileAdminToggle.classList.remove("hidden");
            }

            showToast(
              "データの同期完了",
              "スプレッドシートから最新のデータを取得しました。",
              "success",
            );

            // ルーティング開始（ハッシュが空か無効なら一般マッチングへ）
            const currentHash = window.location.hash;
            if (
              !currentHash ||
              ![
                "#user-matching",
                "#user-profile",
                "#dashboard",
                "#matching",
                "#members",
                "#settings",
              ].includes(currentHash)
            ) {
              window.location.hash = "#user-matching";
            } else {
              handleRoute();
            }
          } else {
            showToast(
              "同期エラー",
              res.error || "データの読み込みに失敗しました。",
              "error",
            );
          }
        } catch (e) {
          showToast(
            "エラー",
            "サーバーとの接続中に例外が発生しました：" + e.toString(),
            "error",
          );
        }
      }

      // アカウントUI表示の更新
      function updateUserUI() {
        const pcEmail = document.getElementById("pc-user-email");
        const mobEmail = document.getElementById("mobile-user-email");
        const pcRole = document.getElementById("pc-user-role-badge");

        if (pcEmail)
          pcEmail.textContent = state.currentUserEmail || "ゲストユーザー";
        if (mobEmail) mobEmail.textContent = state.currentUserEmail || "ゲスト";

        if (pcRole && state.isAdmin) {
          pcRole.textContent = "SYSTEM ADMIN";
          pcRole.className =
            "text-[9px] font-bold px-1.5 py-0.5 rounded bg-indigo-50 text-indigo-600 dark:bg-indigo-950/40 dark:text-indigo-400 border border-indigo-100/30 dark:border-indigo-900/30 tracking-wider uppercase mt-1 w-max";
        }
      }

      // ==========================================
      // テーマ管理 (ライト/ダーク/システム)
      // ==========================================
      function applyTheme(themeMode) {
        state.theme = themeMode;
        localStorage.setItem("lunch-app-theme", themeMode);

        const root = document.documentElement;
        const isDark =
          themeMode === "dark" ||
          (themeMode === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);

        if (isDark) {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }

        updateThemeSelectorUI();
      }

      function updateThemeSelectorUI() {
        ["light", "dark", "system"].forEach((m) => {
          const btn = document.getElementById(`theme-btn-${m}`);
          if (!btn) return;
          if (state.theme === m) {
            btn.className =
              "theme-btn px-2.5 py-1 rounded-md text-xs font-semibold flex items-center gap-1.5 transition-all bg-white dark:bg-zinc-700 shadow-sm text-slate-800 dark:text-zinc-100";
          } else {
            btn.className =
              "theme-btn px-2.5 py-1 rounded-md text-xs font-medium flex items-center gap-1.5 transition-all text-slate-500 hover:text-slate-800 dark:hover:text-zinc-200";
          }
        });

        const mobileBtnIcon = document.getElementById("theme-icon-mobile");
        if (mobileBtnIcon) {
          const root = document.documentElement;
          const isCurrentlyDark = root.classList.contains("dark");
          mobileBtnIcon.setAttribute(
            "data-lucide",
            isCurrentlyDark ? "sun" : "moon",
          );
          lucide.createIcons();
        }
      }

      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", () => {
          if (state.theme === "system") {
            applyTheme("system");
          }
        });

      // ==========================================
      // ルーティング制御とセキュリティガード
      // ==========================================
      function handleRoute() {
        const hash = window.location.hash || "#user-matching";

        // クエリパラメータのパース
        let viewName = hash.replace("#", "");
        let queryParams = {};
        if (viewName.includes("?")) {
          const parts = viewName.split("?");
          viewName = parts[0];
          const queryStr = parts[1];
          queryStr.split("&").forEach((p) => {
            const [k, v] = p.split("=");
            if (k && v) {
              queryParams[k] = decodeURIComponent(v);
            }
          });
        }

        // セキュリティ保護: 管理者専用ハッシュで、かつ非管理者の場合
        const adminViews = ["dashboard", "matching", "members", "settings"];
        if (adminViews.includes(viewName) && !state.isAdmin) {
          showToast(
            "アクセス拒否",
            "この画面を開くには管理者権限が必要です。",
            "error",
          );
          window.location.hash = "#user-matching";
          return;
        }

        // 画面遷移時にチャットポーリングを確実にクリーンアップ
        if (state.chatInterval) {
          clearInterval(state.chatInterval);
          state.chatInterval = null;
          console.log(
            "[DEBUG] チャット自動ポーリングをクリーンアップしました。",
          );
        }

        state.currentView = viewName;
        state.currentQueryParams = queryParams; // パラメータを保持

        // ナビゲーションメニューのアクティブ化（PC側）
        const allViews = [
          "user-matching",
          "user-profile",
          "dashboard",
          "matching",
          "members",
          "settings",
        ];
        allViews.forEach((id) => {
          const pcNav = document.getElementById(`nav-${id}`);
          if (pcNav) {
            if (id === viewName) {
              pcNav.className =
                "nav-item flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400 group";
            } else {
              pcNav.className =
                "nav-item flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all text-slate-600 hover:bg-slate-50 dark:text-zinc-400 dark:hover:bg-zinc-800/50 group";
            }
          }
        });

        // モバイル用ボトムナビのアクティブ＆トグル制御
        updateMobileNavigationUI(viewName);

        // タイトルの変更
        const headerTitle = document.getElementById("header-title");
        if (headerTitle) {
          const titles = {
            "user-matching": "次回ランチグループ結果",
            "user-profile": "自分のプロフィール登録",
            chat: "グループチャット",
            dashboard: "管理者ダッシュボード",
            matching: "インテリジェントマッチング生成",
            members: "メンバーマスタ管理",
            settings: "システム全体設定",
          };
          headerTitle.textContent = titles[viewName] || "マッチングポータル";
        }

        renderView();
      }

      // モバイルナビゲーション表示切り替え
      function updateMobileNavigationUI(viewName) {
        const userNav = document.getElementById("mobile-nav-user");
        const adminNav = document.getElementById("mobile-nav-admin");
        const toggleBtn = document.getElementById("mobile-admin-mode-toggle");
        const toggleText = document.getElementById("mobile-admin-toggle-text");

        if (!userNav || !adminNav) return;

        const adminViews = ["dashboard", "matching", "members", "settings"];

        if (adminViews.includes(viewName)) {
          // 管理者ビューのナビゲーションを表示
          userNav.classList.add("hidden");
          adminNav.classList.remove("hidden");
          state.mobileNavMode = "admin";

          if (toggleText) toggleText.textContent = "一般用へ";
        } else {
          // 一般ユーザービューのナビゲーションを表示
          userNav.classList.remove("hidden");
          adminNav.classList.add("hidden");
          state.mobileNavMode = "user";

          if (toggleText) toggleText.textContent = "管理者用へ";
        }

        // アクティブクラスの付与（モバイル）
        const mobViewIds = [
          "user-matching",
          "user-profile",
          "dashboard",
          "matching",
          "members",
          "settings",
        ];
        mobViewIds.forEach((id) => {
          const mobNav = document.getElementById(`nav-${id}-mobile`);
          if (mobNav) {
            if (id === viewName) {
              mobNav.className =
                "nav-item-mobile flex flex-col items-center justify-center gap-1 text-[10px] font-semibold py-1.5 flex-1 select-none text-indigo-600 dark:text-indigo-400";
            } else {
              mobNav.className =
                "nav-item-mobile flex flex-col items-center justify-center gap-1 text-[10px] font-medium py-1.5 flex-1 select-none text-slate-400 dark:text-zinc-500";
            }
          }
        });
      }

      // ==========================================
      // ビューレンダリング
      // ==========================================
      function renderView() {
        const container = document.getElementById("app-view");
        if (!container) return;

        container.classList.remove("fade-in");

        let html = "";

        switch (state.currentView) {
          // --- 一般ユーザービュー ---
          case "user-matching":
            html = getUserMatchingViewHtml();
            break;
          case "user-profile":
            html = getUserProfileViewHtml();
            break;
          case "chat":
            html = getChatViewHtml(state.currentQueryParams.roomId);
            break;

          // --- 管理者ビュー ---
          case "dashboard":
            html = getDashboardViewHtml();
            break;
          case "matching":
            html = getMatchingViewHtml();
            break;
          case "members":
            html = getMembersViewHtml();
            break;
          case "settings":
            html = getSettingsViewHtml();
            break;
          default:
            html = `<div class="p-8 text-center text-red-500">お探しの画面が見つかりません。</div>`;
        }

        container.innerHTML = html;
        container.classList.add("fade-in");

        lucide.createIcons();
        attachViewEvents();
      }

      // ==========================================
      // 各画面のHTML生成 (SPAテンプレート)
      // ==========================================

      // --- 👤 一般ユーザー①：次回マッチング結果確認 ---
      function getUserMatchingViewHtml() {
        // 履歴の0番目（最新）が次回（最新）のマッチング結果
        if (state.history.length === 0) {
          return `
          <div class="flex flex-col items-center justify-center h-96 gap-4 text-center">
            <div class="w-16 h-16 rounded-full bg-slate-100 dark:bg-zinc-900 flex items-center justify-center text-slate-400 dark:text-zinc-500 shadow-inner">
              <i data-lucide="coffee" class="w-8 h-8"></i>
            </div>
            <div class="space-y-1">
              <h3 class="font-heading font-bold text-base text-slate-800 dark:text-zinc-100">次回のマッチングは現在準備中です</h3>
              <p class="text-xs text-slate-500 dark:text-zinc-400 max-w-sm leading-relaxed">管理者がマッチング処理を確定すると、こちらに次回のランチグループと雑談おすすめテーマが公開されます。</p>
            </div>
          </div>
        `;
        }

        const latestMatchingDate = state.history[0].date;

        // 同じ日付の全グループを抽出
        const latestGroups = state.history.filter(
          (h) => h.date === latestMatchingDate,
        );

        let groupCards = "";
        latestGroups.forEach((g) => {
          const namesList = g.memberNames
            .map((name, index) => {
              // 所属部署を取得
              const cleanName = (n) => (n ? n.replace(/\s+/g, "") : "");
              const memberInfo =
                state.members.find(
                  (m) => cleanName(m.name) === cleanName(name),
                ) || {};
              const dept = memberInfo.department || "不明";

              // ログインユーザー自身かどうか判定 (大文字小文字を区別せず比較)
              const isMe =
                state.myProfile &&
                name.toLowerCase() === state.myProfile.name.toLowerCase();

              const boxClass = isMe
                ? "flex flex-col p-2.5 rounded-lg border-2 border-indigo-500 bg-indigo-50/15 dark:bg-indigo-950/40 text-xs relative group cursor-help"
                : "flex flex-col p-2.5 rounded-lg border border-slate-100 dark:border-zinc-800 bg-slate-50/50 dark:bg-zinc-800/30 text-xs relative group cursor-help";

              // 奇数・偶数（左右の列）での位置調整クラス
              const isLeftColumn = index % 2 === 0;
              const popoverAlignClass = isLeftColumn
                ? "left-0 translate-x-0 origin-bottom-left"
                : "right-0 left-auto translate-x-0 origin-bottom-right";
              const arrowAlignClass = isLeftColumn
                ? "left-6 translate-x-0"
                : "right-6 left-auto translate-x-0";

              return `
            <div class="${boxClass}">
              <span class="font-bold ${isMe ? "text-indigo-600 dark:text-indigo-400" : "text-slate-800 dark:text-zinc-100"}">${escapeHtml(name)}</span>
              <span class="text-[9px] ${isMe ? "text-indigo-500/80 dark:text-indigo-350" : "text-slate-400 dark:text-zinc-500"} font-medium mt-0.5">${escapeHtml(dept)}</span>
              ${renderMemberPopoverHtml(name, dept, memberInfo, popoverAlignClass, arrowAlignClass)}
            </div>
          `;
            })
            .join("");

          // 自分がこのグループのメンバーに含まれているか判定 (管理者の場合はすべてのルームを開けるようにする)
          const isMyGroup =
            state.isAdmin ||
            (state.myProfile &&
              g.memberNames
                .map((n) => n.toLowerCase())
                .includes(state.myProfile.name.toLowerCase()));

          // マークを付ける「自分のグループ」かどうか
          const isReallyMyGroup =
            state.myProfile &&
            g.memberNames
              .map((n) => n.toLowerCase())
              .includes(state.myProfile.name.toLowerCase());

          const roomId = `${latestMatchingDate}_${g.groupId}`;

          const cardClass = isReallyMyGroup
            ? "user-group-card p-6 border-2 border-indigo-500 bg-indigo-50/5 dark:border-indigo-500 dark:bg-indigo-950/10 rounded-2xl flex flex-col justify-between gap-4 shadow-md transition-all duration-200 relative scale-[1.01]"
            : "user-group-card p-6 border-2 border-slate-200 dark:border-zinc-800/80 rounded-2xl bg-white dark:bg-zinc-900 flex flex-col justify-between gap-4 shadow-sm hover:border-slate-350 dark:hover:border-zinc-700 hover:shadow transition-all duration-200 relative";

          groupCards += `
          <div id="user-group-${escapeHtml(g.groupId)}" class="${cardClass}">
            <!-- あなたのグループバッジ -->
            <div class="my-group-indicator absolute -top-3.5 right-4 px-2.5 py-1 text-[9px] font-bold bg-indigo-600 text-white rounded-full shadow ${isReallyMyGroup ? "flex" : "hidden"} items-center gap-1">
              <i data-lucide="party-popper" class="w-3.5 h-3.5"></i>
              <span>あなたのグループです！</span>
            </div>

            <div class="space-y-4">
              <div class="flex items-center justify-between border-b border-slate-50 dark:border-zinc-800/50 pb-3">
                <h4 class="font-heading font-bold text-sm text-slate-800 dark:text-zinc-200">${escapeHtml(g.groupId)}</h4>
                <span class="text-[9px] font-bold px-2 py-0.5 rounded bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400">${g.memberNames.length} 人組</span>
              </div>
              
              <div class="grid grid-cols-2 gap-2 my-2">
                ${namesList}
              </div>
            </div>
            
            <!-- グループチャットへのアクセスボタン (極上のデザイン & セキュリティ表示) -->
            <div class="mt-2 border-t border-slate-100 dark:border-zinc-800/40 pt-3">
              ${
                isMyGroup
                  ? `
                <a href="#chat?roomId=${encodeURIComponent(roomId)}" class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 text-white font-semibold text-xs rounded-xl shadow transition-colors flex items-center justify-center gap-1.5 animate-pulse-subtle">
                  <i data-lucide="message-square" class="w-4 h-4"></i>
                  <span>グループチャットを開く</span>
                </a>
              `
                  : `
                <button disabled class="w-full py-2 bg-slate-100 dark:bg-zinc-850/50 text-slate-405 text-slate-400 dark:text-zinc-500 font-semibold text-xs rounded-xl flex items-center justify-center gap-1.5 cursor-not-allowed">
                  <i data-lucide="lock" class="w-4 h-4"></i>
                  <span>メンバー専用チャット</span>
                </button>
              `
              }
            </div>
            
            ${(() => {
              if (!g.memo) return "";
              const cleaned = g.memo
                .replace(/【手動微調整あり】/g, "")
                .replace(/【独自ロジック選出】/g, "")
                .replace(/\[手動微調整あり\]/g, "")
                .replace(/\[独自ロジック選出\]/g, "")
                .trim();

              if (!cleaned) return "";

              return `
                <div class="h-36 flex flex-col text-xs text-slate-600 dark:text-zinc-300 leading-relaxed border-t border-slate-100 dark:border-zinc-800/60 bg-slate-50 dark:bg-zinc-950/80 -mx-6 -mb-6 p-6 rounded-b-2xl">
                  <p class="font-bold text-slate-800 dark:text-zinc-200 mb-2 flex items-center gap-1 shrink-0"><i data-lucide="sparkles" class="w-3.5 h-3.5 text-indigo-500 dark:text-indigo-400"></i> 雑談おすすめテーマ</p>
                  <div class="flex-1 overflow-y-auto pr-1">
                    ${escapeHtml(cleaned)}
                  </div>
                </div>
              `;
            })()}
          </div>
        `;
        });

        return `
        <div class="space-y-8">
          <!-- ウェルカムバナー -->
          <div class="p-6 rounded-2xl border border-slate-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 shadow-premium dark:shadow-premium-dark flex flex-col gap-2.5">
            <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-bold bg-indigo-50 text-indigo-700 dark:bg-indigo-950/40 dark:text-indigo-400 w-max">
              <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
              <span>メンバー確定日: ${escapeHtml(latestMatchingDate)}</span>
            </div>
            <h3 class="font-heading font-bold text-lg text-slate-900 dark:text-zinc-50 leading-snug">ランチ交流会のメンバー発表です！</h3>
            <p class="text-xs text-slate-500 dark:text-zinc-400 max-w-4xl leading-relaxed">
              以下のグループ内チャット欄で、ランチ交流会の日程調整を行ってください。お互い思いやりのある発言、調整をお願いします。
            </p>
          </div>

          <!-- グループカードグリッド -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="user-groups-grid">
            ${groupCards}
          </div>
        </div>
      `;

      // 自己プロファイルの保存
      async function handleSaveSelfProfile() {
        const name = document.getElementById("self-name").value.trim();
        const department = getSelectedDepartment("self");
        if (department === null) return;
        const participationType = document.getElementById(
          "self-participation-type",
        ).value;
        const interests = document
          .getElementById("self-interests")
          .value.trim();
        const specialty = document
          .getElementById("self-specialty")
          .value.trim();
        const weakness = document.getElementById("self-weakness").value.trim();
        const considerations = document
          .getElementById("self-considerations")
          .value.trim();
        const status = document.getElementById("self-status").value === "true";

        const ratings = getValueRatings("self");

        if (!name || !department) {
          showToast("入力エラー", "名前と部署は入力必須です。", "error");
          return;
        }

        if (!validateBioLengths(interests, specialty, weakness)) return;

        const profileObj = {
          name,
          department,
          participationType,
          interests,
          specialty,
          weakness,
          motivation: ratings.motivation,
          teamwork: ratings.teamwork,
          private: ratings.private,
          evaluation: ratings.evaluation,
          growth: ratings.growth,
          status,
          considerations,
        };

        showToast("保存中", "プロフィール情報を登録しています...", "warning");

        try {
          const res = await callGas("registerSelfProfile", profileObj);
          if (res.success) {
            state.myProfile = res.myProfile;

            // 登録完了後、全メンバーリストも再ロードして同期する
            await refreshStateFromServer();

            showToast(
              "保存成功",
              "プロフィールの保存が完了しました！次回マッチングをお楽しみに。",
              "success",
            );

            // 保存後は次回マッチング結果画面へ遷移
            window.location.hash = "#user-matching";
          } else {
            showToast(
              "保存エラー",
              res.error || "プロフィールの登録に失敗しました。",
              "error",
            );
          }
        } catch (e) {
          showToast(
            "エラー",
            "保存中に例外が発生しました：" + e.toString(),
            "error",
          );
        }
      }

      // チャットメッセージ履歴の読込と描画 (5秒毎ポーリング)
      async function loadChatMessages(roomId, isPolling = false) {
        const container = document.getElementById("chat-messages-container");
        if (!container) return;

        try {
          const res = await callGas("getChatMessages", roomId);
          if (res.success) {
            const messages = res.messages || [];

            if (messages.length === 0) {
              container.innerHTML = `
              <div class="flex-1 flex flex-col items-center justify-center gap-2 py-12 text-center text-slate-400 dark:text-zinc-500">
                <i data-lucide="message-square-dashed" class="w-8 h-8 opacity-60"></i>
                <p class="text-xs font-semibold">チャットメッセージはまだありません</p>
                <p class="text-[10px] opacity-80">グループメンバーへの挨拶や、ランチ会の日程調整などを気軽に書き込んでみましょう！</p>
              </div>
            `;
              lucide.createIcons();
              return;
            }

            // スクリュー位置の判定：ユーザーが手動で過去ログを上に遡って読んでいるか
            const isAtBottom =
              container.scrollHeight -
                container.scrollTop -
                container.clientHeight <
              150;

            let messagesHtml = "";
            messagesHtml += `<div class="space-y-4 flex-1">`;

            // ルームIDから開催日とグループIDをパースして該当のグループ情報を取得
            const parts = roomId.split("_");
            const dateStr = parts[0] || "";
            const groupId = parts[1] || "";
            const matchingGroup = state.history.find(
              (h) => h.date === dateStr && h.groupId === groupId,
            );

            // 管理者リストを取得
            const adminEmailsStr =
              (state.settings && state.settings.admin_emails) || "";
            const adminEmails = adminEmailsStr
              .split(",")
              .map((e) => e.trim().toLowerCase());

            messagesHtml += messages
              .map((msg) => {
                // 自分が送信したメッセージか判定 (大文字小文字を区別せず照合)
                const isMe =
                  msg.senderEmail.toLowerCase() ===
                  state.currentUserEmail.toLowerCase();

                // 送信者が管理者であるか
                const isSenderAdmin = adminEmails.includes(
                  msg.senderEmail.toLowerCase(),
                );

                // 送信者がこのグループの本来のメンバーであるか判定
                let isGroupMember = false;
                if (matchingGroup) {
                  const cleanEmail = msg.senderEmail.toLowerCase();
                  const senderMember = state.members.find(
                    (m) => m.email.toLowerCase() === cleanEmail,
                  );
                  if (senderMember) {
                    isGroupMember = matchingGroup.memberIds.includes(
                      senderMember.id,
                    );
                  } else {
                    const cleanName = (n) => (n ? n.replace(/\s+/g, "") : "");
                    isGroupMember = matchingGroup.memberNames.some(
                      (name) => cleanName(name) === cleanName(msg.senderName),
                    );
                  }
                }

                // 「グループメンバー以外の管理者」であるかの判定
                const isGroupOuterAdmin = isSenderAdmin && !isGroupMember;

                // 日本時間で見やすいフォーマットに変換 (例: 15:30)
                let timeStr = "";
                if (msg.timestamp) {
                  const d = new Date(msg.timestamp);
                  timeStr =
                    ("0" + d.getHours()).slice(-2) +
                    ":" +
                    ("0" + d.getMinutes()).slice(-2);
                }

                // 改行の対応
                const formattedMessage = escapeHtml(msg.message).replace(
                  /\n/g,
                  "<br>",

      // チャットメッセージの非同期送信処理
      async function handleSendChatMessage(roomId) {
        const input = document.getElementById("chat-message-input");
        const sendBtn = document.getElementById("btn-send-message");
        if (!input || !sendBtn) return;

        const messageText = input.value.trim();
        if (!messageText) return;

        // UI制御：送信中状態
        input.disabled = true;
        sendBtn.disabled = true;
        const originalBtnText = sendBtn.innerHTML;
        sendBtn.innerHTML = `<div class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>`;

        try {
          const res = await callGas("sendChatMessage", roomId, messageText);
          if (res.success) {
            input.value = "";
            // 送信直後に即座にメッセージ一覧を再描画して、一番下へスクロールさせる
            await loadChatMessages(roomId, false);
          } else {
            showToast(
              "送信失敗",
              res.error || "メッセージの送信に失敗しました。",
              "error",
            );
          }
        } catch (e) {
          showToast(
            "エラー",
            "メッセージ送信中に例外が発生しました：" + e.toString(),
            "error",
          );
        } finally {
          input.disabled = false;
          sendBtn.disabled = false;
          sendBtn.innerHTML = originalBtnText;

          // フォーカスを復帰
          input.focus();
        }
      }

            colorClass = "bg-sky-500 text-white border-sky-500 dark:bg-sky-400 dark:border-sky-400";

            colorClass = "bg-slate-400 text-white border-slate-400 dark:bg-zinc-550 dark:border-zinc-550";
          } else if (num === 2) {
            colorClass = "bg-amber-500 text-white border-amber-500 dark:bg-amber-400 dark:border-amber-400";

      // --- 各画面のイベントアタッチメント ---
      function attachViewEvents() {
        // --- ① 共通UIビュー（モバイル用管理者切り替えトグルなど）のバインディング ---
        const mobileAdminToggle = document.getElementById(
          "mobile-admin-mode-toggle",
        );
        if (mobileAdminToggle) {
          // 多重イベント登録を防ぐため、一旦クローンしてリスナーをクリア
          const newToggle = mobileAdminToggle.cloneNode(true);
          mobileAdminToggle.parentNode.replaceChild(
            newToggle,
            mobileAdminToggle,
          );

          newToggle.addEventListener("click", () => {
            if (state.mobileNavMode === "user") {
              window.location.hash = "#dashboard";
            } else {
              window.location.hash = "#user-matching";
            }
          });
        }

        const mobileThemeToggle = document.getElementById(
          "theme-toggle-mobile",
        );
        if (mobileThemeToggle) {
          const newThemeToggle = mobileThemeToggle.cloneNode(true);
          mobileThemeToggle.parentNode.replaceChild(
            newThemeToggle,
            mobileThemeToggle,
          );

          newThemeToggle.addEventListener("click", () => {
            const root = document.documentElement;
            const isDark = root.classList.contains("dark");
            applyTheme(isDark ? "light" : "dark");
          });
        }

        // PC用テーマ変更ボタンのイベント紐付け
        ["light", "dark", "system"].forEach((mode) => {
          const btn = document.getElementById(`theme-btn-${mode}`);
          if (btn) {
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.addEventListener("click", () => applyTheme(mode));
          }
        });

        // --- ② 各ビューの動的イベントバインディング (GASサンドボックス対策) ---

        // プロフィール設定保存ボタン
        const btnSaveSelfProfile = document.getElementById(
          "btn-save-self-profile",
        );
        if (btnSaveSelfProfile) {
          btnSaveSelfProfile.addEventListener("click", handleSaveSelfProfile);
        }

        // マッチング自動生成ボタン
        const btnGenerateMatching = document.getElementById(
          "btn-generate-matching",
        );
        if (btnGenerateMatching) {
          btnGenerateMatching.addEventListener("click", handleGenerateMatching);
        }
        // マッチングフォーム自体の change イベント (プロンプト表示切り替え用)
        const matchingForm = document.getElementById("matching-form");
        if (matchingForm) {
          matchingForm.addEventListener("change", togglePromptVisibility);

          // 1グループ人数が変更されたら、組数の上限・選択肢を再生成するイベント
          const groupSizeSelect = document.getElementById("group-size");
          if (groupSizeSelect) {
            groupSizeSelect.addEventListener("change", updateGroupCountOptions);
          }

          // 画面初期表示時にも組数の上限・選択肢を再生成
          setTimeout(updateGroupCountOptions, 100);
        }

        // メンバー追加・編集保存ボタン
        const btnSubmitMember = document.getElementById("btn-submit-member");
        if (btnSubmitMember) {
          btnSubmitMember.addEventListener("click", handleSubmitMember);
        }

        // システム設定保存ボタン
        const btnSaveSettings = document.getElementById("btn-save-settings");
        if (btnSaveSettings) {
          btnSaveSettings.addEventListener("click", handleSaveSettings);
        }

        // APIキーの接続テストボタン
        const btnTestApiKey = document.getElementById("btn-test-api-key");
        if (btnTestApiKey) {
          btnTestApiKey.addEventListener("click", testApiKey);
        }

        // マッチング履歴クリアボタン
        const btnClearHistory = document.getElementById("btn-clear-history");
        if (btnClearHistory) {
          btnClearHistory.addEventListener("click", handleClearHistory);
        }

        // データベース再初期化ボタン
        const btnReinitDb = document.getElementById("btn-reinit-db");
        if (btnReinitDb) {
          btnReinitDb.addEventListener("click", handleReinitDb);
        }

        // --- ④-B 管理者：部署マスタ設定イベント ---
        if (state.currentView === "settings") {
          // 部署一覧を動的に描画

              newDeptInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                  e.preventDefault();
                  handleAddDept();
                }
              });
            }
          }

        // --- ③ チャットビュー固有のバインディング & ポーリング初期化 ---
        if (state.currentView === "chat") {
          const roomId = state.currentQueryParams.roomId;

          // 初回メッセージ履歴を即時ロード
          loadChatMessages(roomId, false);

          // 5秒間隔でのリアルタイム自動更新 (ポーリング) を開始
          state.chatInterval = setInterval(() => {
            loadChatMessages(roomId, true);
          }, 5000);

          // 入力エリアでのEnterキー送信制御 (Ctrl+Enterで送信、Enter単体は改行)
          const chatInput = document.getElementById("chat-message-input");
          if (chatInput) {
            // スマホなどのスクロールが走るデバイスも考慮し、自然に入力できるよう自動フォーカス
            chatInput.focus();
            chatInput.addEventListener("keydown", (e) => {
              if (e.key === "Enter" && e.ctrlKey) {
                e.preventDefault(); // 改行の抑止
                handleSendChatMessage(roomId);
              }
            });
          }
        }

        // 趣味・特技・弱点のリアルタイムカウンター初期化 (プロフィール画面表示時)
        if (state.currentView === "user-profile") {
          setupMemberFormCounters("self");
        }
      }

      // Geminiプロンプト入力欄の表示/非表示トグル (ラジオボタン連動)
      function togglePromptVisibility() {
        const form = document.getElementById("matching-form");
        if (!form) return;
        const mode = new FormData(form).get("matching_mode");
        const container = document.getElementById(
          "additional-prompt-container",
        );
        if (container) {
          if (mode === "gemini") {
            container.classList.remove("hidden");
          } else {
            container.classList.add("hidden");
          }
        }
      }

      // 目標人数の変更に応じて、あまり（あふれ）が出ない上限に組数の選択肢を動的に更新する
      function updateGroupCountOptions() {
        const groupSizeSelect = document.getElementById("group-size");
        const groupCountSelect = document.getElementById("group-count");
        if (!groupSizeSelect || !groupCountSelect) return;

        const groupSize = parseInt(groupSizeSelect.value, 10);
        const activeCount = state.activeCount || 0;
        const currentSelectedCount = parseInt(groupCountSelect.value, 10);

        // 上限を「あまり（あふれ）が出ない数」、すなわち Math.ceil(activeCount / groupSize) に設定
        // ただし、最低でも1組は選択できるようにする
        const maxGroupCount = Math.max(1, Math.ceil(activeCount / groupSize));

        let groupCountOptions = "";
        for (let i = 1; i <= maxGroupCount; i++) {
          // 以前選択されていた値、または上限を超えた場合は新たな上限を選択状態にする
          const selected =
            i === currentSelectedCount ||
            (i === maxGroupCount && currentSelectedCount > maxGroupCount)
              ? "selected"
              : "";
          groupCountOptions += `<option value="${i}" ${selected}>${i} 組</option>`;
        }

        groupCountSelect.innerHTML = groupCountOptions;
      }

      // --- ② マッチング作成コントローラー ---
      async function handleGenerateMatching() {
        const form = document.getElementById("matching-form");
        if (!form) return;

        const formData = new FormData(form);
        const params = {
          mode: formData.get("matching_mode"),
          groupSize: formData.get("default_group_size"),
          groupCount: formData.get("default_group_count"), // 組数指定パラメータ
          additionalPrompt: formData.get("additional_prompt") || "",
        };

        state.isMatchingRunning = true;
        renderView();

        try {
          const res = await callGas("runMatching", params);
          state.isMatchingRunning = false;

          if (res.success) {
            state.tempGroups = res.groups;
            state.tempUnmatched = res.unmatched || []; // 今回枠からあふれたメンバー
            state.tempMethod =
              res.method === "logic_fallback"
                ? "Logic (Fallback)"
                : res.method === "logic"
                  ? "Logic"
                  : "Gemini";
            showToast(
              "マッチング案作成完了",
              "グループ分け案が正常に作成されました。内容を確認・調整してください。",
              "success",
            );
          } else {
            showToast(
              "作成エラー",
              res.error || "マッチングの生成に失敗しました。",
              "error",
            );
          }
        } catch (e) {
          state.isMatchingRunning = false;
          showToast(
            "エラー",
            "通信中に例外が発生しました：" + e.toString(),
            "error",
          );
        }

        renderView();
      }

      function discardTempMatching() {
        if (confirm("作成中の一時マッチング案を破棄してよろしいですか？")) {
          state.tempGroups = null;
          renderView();
        }
      }

      function moveMember(fromGroupIdx, fromMemberIdx, toGroupIdx) {
        if (toGroupIdx < 0 || toGroupIdx >= state.tempGroups.length) return;

        const member = state.tempGroups[fromGroupIdx].members[fromMemberIdx];

        state.tempGroups[fromGroupIdx].members.splice(fromMemberIdx, 1);
        state.tempGroups[toGroupIdx].members.push(member);

        markGroupAsModified(fromGroupIdx);
        markGroupAsModified(toGroupIdx);

        renderView();
      }

      // グループ微調整に「修正あり」のメモを追加する補助関数
      function markGroupAsModified(groupIdx) {
        // ユーザー要望に基づき、手動微調整時のタグ付加処理は廃止されました。
      }

      // グループメンバーの操作ハンドラ（移動、削除、交代）
      function handleMemberAction(fromGroupIdx, fromMemberIdx, actionValue) {
        if (!actionValue) return;

        if (actionValue.startsWith("move_")) {
          const toGroupIdx = parseInt(actionValue.split("_")[1], 10);
          moveMember(fromGroupIdx, fromMemberIdx, toGroupIdx);
        } else if (actionValue === "remove") {
          // グループから外して控え（あふれ）に戻す
          const member = state.tempGroups[fromGroupIdx].members[fromMemberIdx];
          state.tempGroups[fromGroupIdx].members.splice(fromMemberIdx, 1);
          if (!state.tempUnmatched) state.tempUnmatched = [];
          state.tempUnmatched.push(member);

          markGroupAsModified(fromGroupIdx);
          showToast(
            "メンバーを控えに戻しました",
            `${member.name} さんを控えメンバーに移動しました。`,
            "info",
          );
          renderView();
        } else if (actionValue.startsWith("swap_")) {
          // 控えメンバーと交代する
          const unmatchedIdx = parseInt(actionValue.split("_")[1], 10);
          if (state.tempUnmatched && state.tempUnmatched[unmatchedIdx]) {
            const groupMember =
              state.tempGroups[fromGroupIdx].members[fromMemberIdx];
            const unmatchedMember = state.tempUnmatched[unmatchedIdx];

            // 入れ替え
            state.tempGroups[fromGroupIdx].members[fromMemberIdx] =
              unmatchedMember;
            state.tempUnmatched[unmatchedIdx] = groupMember;

            markGroupAsModified(fromGroupIdx);
            showToast(
              "メンバーを交代しました",
              `${groupMember.name} さんと ${unmatchedMember.name} さんを交代しました。`,
              "success",
            );
            renderView();
          }
        }
      }

      // 控えメンバーをグループに追加する
      function addUnmatchedToGroup(unmatchedIdx, toGroupIdx) {
        if (!state.tempUnmatched || !state.tempUnmatched[unmatchedIdx]) return;
        if (toGroupIdx < 0 || toGroupIdx >= state.tempGroups.length) return;

        const member = state.tempUnmatched[unmatchedIdx];
        state.tempUnmatched.splice(unmatchedIdx, 1);
        state.tempGroups[toGroupIdx].members.unshift(member); // 一番上（先頭）に追加

        markGroupAsModified(toGroupIdx);
        showToast(
          "メンバーを追加しました",
          `${member.name} さんを ${state.tempGroups[toGroupIdx].groupId} に追加しました。`,
          "success",
        );
        renderView();
      }

      function updateGroupMemo(groupIdx, value) {
        if (state.tempGroups && state.tempGroups[groupIdx]) {
          state.tempGroups[groupIdx].memo = value;
        }
      }

      async function confirmTempMatching() {
        if (!state.tempGroups) return;

        const validGroups = state.tempGroups.filter(
          (g) => g.members.length > 0,
        );

        if (validGroups.length === 0) {
          showToast("エラー", "有効なグループが存在しません。", "error");
          return;
        }

        showToast("保存中", "マッチング履歴を保存しています...", "warning");

        try {
          const res = await callGas(
            "saveMatchingHistory",
            validGroups,
            state.tempMethod,
          );
          if (res.success) {
            state.tempGroups = null;
            state.tempMethod = "";
            showToast(
              "確定・保存完了",
              "マッチング結果が履歴シートに保存されました！ユーザーポータルに公開中。",
              "success",
            );

            const loadRes = await callGas("getInitialData");
            if (loadRes.success) {
              state.members = loadRes.members;
              state.settings = loadRes.settings;
              state.history = loadRes.history;
              state.totalCount = loadRes.totalCount;
              state.activeCount = loadRes.activeCount;
              state.hasApiKey = loadRes.hasApiKey;
            }

            window.location.hash = "#user-matching";
          } else {
            showToast(
              "保存エラー",
              res.error || "スプレッドシートへの保存に失敗しました。",
              "error",
            );
          }
        } catch (e) {
          showToast(
            "エラー",
            "保存中に例外が発生しました：" + e.toString(),
            "error",
          );
        }
      }

      // 履歴から特定のグループを完全に削除する (管理者のみ)
      async function handleDeleteMatchingGroup(date, groupId) {
        if (
          !confirm(
            `【削除確認】\n日付: ${date}\nグループ: ${groupId}\n\nこのグループを履歴から完全に削除しますか？\n（このグループのチャット履歴もすべて削除されます。この操作は取り消せません）`,
          )
        ) {

        showToast("削除中", "グループを削除しています...", "warning");

              "success",

              state.settings = loadRes.settings;
              state.history = loadRes.history;

      // --- ⑤-メンバー管理コントローラー (管理者用) ---
      function getUniqueDepartments() {
        const depts = state.members.map((m) => m.department).filter(Boolean);
        return [...new Set(depts)].sort();
      }

      function filterMembersTable() {
        const searchVal = document
          .getElementById("member-search")
          .value.toLowerCase()
          .trim();
        const deptVal = document.getElementById("member-dept-filter").value;
        const tbody = document.getElementById("member-table-body");
        if (!tbody) return;

        const rows = tbody.getElementsByTagName("tr");

        for (let i = 0; i < rows.length; i++) {
          const row = rows[i];
          if (row.cells.length < 10) continue;

          const name = row.cells[0].textContent.toLowerCase();
          const email = row.cells[1].textContent.toLowerCase();
          const dept = row.cells[2].textContent;
          const participationType = row.cells[3].textContent.toLowerCase();
          const interests = row.cells[4].textContent.toLowerCase();
          const specialty = row.cells[5].textContent.toLowerCase();
          const weakness = row.cells[6].textContent.toLowerCase();
          const considerations = row.cells[7].textContent.toLowerCase();

          const matchesSearch =
            !searchVal ||
            name.includes(searchVal) ||
            email.includes(searchVal) ||
            dept.toLowerCase().includes(searchVal) ||
            participationType.includes(searchVal) ||
            interests.includes(searchVal) ||
            specialty.includes(searchVal) ||
            weakness.includes(searchVal) ||
            considerations.includes(searchVal);

          let matchesDept = !deptVal;
          if (deptVal) {
            if (deptVal === "その他") {
              const knownDepts = state.departments.map((d) => d.name);
              matchesDept = !knownDepts.includes(dept) || dept === "その他";
            } else {
              matchesDept = dept.includes(deptVal);
            }
          }

          if (matchesSearch && matchesDept) {
            row.style.display = "";
          } else {
            row.style.display = "none";
          }
        }
      }

      function toggleDeptOtherInput(prefix) {
        const select = document.getElementById(`${prefix}-dept`);
        const container = document.getElementById(
          `${prefix}-dept-other-container`,
        );
        const otherInput = document.getElementById(`${prefix}-dept-other`);

        if (!select || !container) return;

          container.classList.remove("hidden");

       */
      function getSelectedDepartment(prefix) {
        const select = document.getElementById(`${prefix}-dept`);

        if (dept === "その他") {
          const otherInput = document.getElementById(`${prefix}-dept-other`);

              "error",
            );
            return null; // バリデーションエラー時は意図的に null を返して中断させる
          }
        }

      // 趣味の入力カウンター制御ヘルパー
      function setupInterestsCounter(textareaId, counterId) {
        const textarea = document.getElementById(textareaId);
        const counter = document.getElementById(counterId);
        if (!textarea || !counter) return;

        const updateCount = () => {
          const len = textarea.value.length;
          counter.textContent = `${len} / 25`;
          if (len >= 25) {
            counter.className =
              "text-[10px] font-mono font-bold text-red-500 animate-pulse-subtle";
          } else if (len >= 20) {
            counter.className =
              "text-[10px] font-mono font-semibold text-amber-500";
          } else {
            counter.className =
              "text-[10px] font-mono font-medium text-slate-400 dark:text-zinc-500";
          }
        };

        // 初期カウントとイベント登録 (oninputで多重登録を防止)
        updateCount();
        textarea.oninput = updateCount;
      }

      /**
       * メンバーフォーム（一般プロフィール設定 / 管理者代理登録）の趣味・特技・弱点カウンターを一括でセットアップする
       */
      function setupMemberFormCounters(prefix) {
        setupInterestsCounter(
          `${prefix}-interests`,
          `${prefix}-interests-counter`,
        );
        setupInterestsCounter(
          `${prefix}-specialty`,
          `${prefix}-specialty-counter`,
        );
        setupInterestsCounter(
          `${prefix}-weakness`,
          `${prefix}-weakness-counter`,
        );
      }

      /**
       * 趣味・特技・弱点（Bio情報）の文字数制限（全角25文字）を一括バリデーションする
       */
      function validateBioLengths(interests, specialty, weakness) {
        const limit = 25;
        if (interests.length > limit) {
          showToast(
            "入力エラー",
            `趣味は${limit}文字以内で入力してください。`,
            "error",
          );
          return false;
        }
        if (specialty.length > limit) {
          showToast(
            "入力エラー",
            `特技は${limit}文字以内で入力してください。`,
            "error",
          );
          return false;
        }
        if (weakness.length > limit) {
          showToast(
            "入力エラー",
            `弱点は${limit}文字以内で入力してください。`,
            "error",
          );
          return false;
        }
        return true;
      }

      /**

       */
      function resetValueRatingsRadios(prefix, defaultVal = 3) {
        const keys = [
          "motivation",
          "teamwork",
          "private",
          "evaluation",
          "growth",
        ];
        keys.forEach((k) => {

            r.checked = Number(r.value) === defaultVal;
          });

       */
      function setValueRatingsRadios(prefix, ratingsObj) {
        const keys = [
          "motivation",
          "teamwork",
          "private",
          "evaluation",
          "growth",
        ];
        keys.forEach((k) => {
          const targetVal = Number(ratingsObj ? ratingsObj[k] : null) || 3;
          const radios = document.getElementsByName(`${prefix}-${k}`);
          radios.forEach((r) => {
            r.checked = Number(r.value) === targetVal;
          });
        });
      }

      // サーバーサイドデータを再取得し、画面を同期描画する共通ヘルパー
      async function refreshStateFromServer() {
        try {
          const res = await callGas("getInitialData");
          if (res.success) {
            state.members = res.members || [];
            state.totalCount = res.totalCount || 0;
            state.activeCount = res.activeCount || 0;
            state.departments = res.departments || [];
            state.settings = res.settings || {};
            state.hasApiKey = res.hasApiKey || false;
            state.isAdmin = res.isAdmin || false;
            state.currentUserEmail = res.currentUserEmail || "";
            state.myProfile = res.myProfile || null;
            state.history = res.history || [];
          }
          renderView();
        } catch (e) {
          showToast(
            "同期エラー",
            "サーバーデータの再取得に失敗しました：" + e.toString(),
            "error",
          );
        }
      }

      // グローバルへ公開

      window.renderDepartmentFieldHtml = renderDepartmentFieldHtml;
      window.getSelectedDepartment = getSelectedDepartment;
      window.setupInterestsCounter = setupInterestsCounter;
      window.setupMemberFormCounters = setupMemberFormCounters;
      window.validateBioLengths = validateBioLengths;
      window.renderMemberPopoverHtml = renderMemberPopoverHtml;
      window.getValueRatings = getValueRatings;

      function openEditMemberModal(memberId) {
        const member = state.members.find((m) => m.id === memberId);
        if (!member) return;

        state.editingMember = member;

        document.getElementById("member-modal-title").textContent =
          "メンバー情報の代理編集";
        document.getElementById("m-name").value = member.name;
        document.getElementById("m-email").value = member.email;

        const knownDepts = state.departments.map((d) => d.name);
        const isOther =
          member.department && !knownDepts.includes(member.department);
        if (isOther) {
          document.getElementById("m-dept").value = "その他";
          document.getElementById("m-dept-other").value = member.department;
          document
            .getElementById("m-dept-other-container")
            .classList.remove("hidden");
        } else {
          document.getElementById("m-dept").value = member.department || "";
          document.getElementById("m-dept-other").value = "";
          document
            .getElementById("m-dept-other-container")
            .classList.add("hidden");
        }
        document.getElementById("m-participation-type").value =
          member.participationType || "どちらでも";
        document.getElementById("m-interests").value = member.interests || "";
        document.getElementById("m-specialty").value = member.specialty || "";

      async function handleSubmitMember() {
        const name = document.getElementById("m-name").value.trim();
        const email = document.getElementById("m-email").value.trim();
        const dept = getSelectedDepartment("m");
        if (dept === null) return;
        const participationType = document.getElementById(
          "m-participation-type",
        ).value;
        const interests = document.getElementById("m-interests").value.trim();
        const specialty = document.getElementById("m-specialty").value.trim();
        const weakness = document.getElementById("m-weakness").value.trim();

        // 共通ヘルパーを使用して価値観ラジオボタンの取得 (未選択時はデフォルト3)
        const ratings = getValueRatings("m");

        const status = document.getElementById("m-status").value === "true";
        const priority = document.getElementById("m-priority").checked; // 優先フラグの取得

        if (!name || !email || !dept) {
          showToast(
            "入力エラー",
            "必須マーク (*) のある項目は入力必須です。",
            "error",
          );
          return;
        }

        if (!validateBioLengths(interests, specialty, weakness)) return;

        const memberObj = {
          name,
          email,
          department: dept,
          participationType,
          interests,
          specialty,
          weakness,
          motivation: ratings.motivation,
          teamwork: ratings.teamwork,
          private: ratings.private,
          evaluation: ratings.evaluation,
          growth: ratings.growth,
          purpose: "",
          status,
          priority,
        };

        closeMemberModal();
        showToast("保存中", "メンバー情報を保存しています...", "warning");

        try {
          let res;
          if (state.editingMember) {
            memberObj.id = state.editingMember.id;
            res = await callGas("updateMember", memberObj);
          } else {
            res = await callGas("addMember", memberObj);
          }

          if (res.success) {
            showToast(
              "保存完了",
              "メンバー情報を正常に保存しました！",
              "success",
            );

            await refreshStateFromServer();
          } else {
            showToast(
              "保存エラー",
              res.error || "保存に失敗しました。",
              "error",
            );
          }
        } catch (e) {
          showToast(
            "エラー",
            "保存処理中に例外が発生しました：" + e.toString(),
            "error",
          );
        }
      }

      // ==========================================
      // ユーティリティ関数
      // ==========================================
      function escapeHtml(str) {
        if (!str) return "";
        return str
          .toString()
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

        }

        return { success: false, error: "不明なダミーメソッド" };
      }

      // ==========================================
      // GAS サンドボックス保護スコープ対策
      // HTMLのインラインイベントハンドラ（onsubmit / onclick）から
      // JavaScript内の関数を確実に呼び出せるよう、windowオブジェクトに明示的にエクスポートします。
      // ==========================================
      window.handleSaveSettings = handleSaveSettings;
      window.testApiKey = testApiKey;
      window.handleSaveSelfProfile = handleSaveSelfProfile;
      window.handleGenerateMatching = handleGenerateMatching;
      window.handleSubmitMember = handleSubmitMember;
      window.discardTempMatching = discardTempMatching;
      window.confirmTempMatching = confirmTempMatching;
      window.handleDeleteMatchingGroup = handleDeleteMatchingGroup;
      window.handleToggleStatus = handleToggleStatus;
      window.openEditMemberModal = openEditMemberModal;
      window.handleDeleteMember = handleDeleteMember;
      window.openAddMemberModal = openAddMemberModal;
      window.closeMemberModal = closeMemberModal;
      window.handleReinitDb = handleReinitDb;
      window.handleSendChatMessage = handleSendChatMessage;
      window.handleTogglePriority = handleTogglePriority;
      window.updateGroupCountOptions = updateGroupCountOptions;

      // ==========================================
      // アプリケーション起動エントリー
      // ==========================================
      window.addEventListener("DOMContentLoaded", () => {
        window.addEventListener("hashchange", handleRoute);
        loadInitialData();
      });
    </script>
  </body>
